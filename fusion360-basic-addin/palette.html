<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Troy's Plugin</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 12px; }
    .row { margin-bottom: 10px; }
    button { padding: 6px 10px; }
    #result {
      white-space: pre-wrap;
      border: 1px solid #ccc;
      min-height: 280px;
      padding: 8px;
      background: #fafafa;
      font-size: 12px;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <div class="row">
    <button id="scanBtn">Scan</button>
    <button id="applyColorBtn">Apply Color</button>
    <button id="select15Btn">Select 15mm</button>
    <button id="select18Btn">Select 18mm</button>
    <button id="selectOtherBtn">Select Other</button>
    <button id="detectContactsBtn">Detect Contacts</button>
    <button id="drillHolesBtn">Drill Holes</button>
    <button id="halfSlotBtn">Half Slot</button>
    <button id="fullSlotBtn">Full Slot</button>
    <button id="restoreBtn">Restore</button>
  </div>
  <div id="result">Click Scan to list bodies and apply thickness colors.</div>

  <script>
    const result = document.getElementById('result');
    const scanBtn = document.getElementById('scanBtn');
    const applyColorBtn = document.getElementById('applyColorBtn');
    const select15Btn = document.getElementById('select15Btn');
    const select18Btn = document.getElementById('select18Btn');
    const selectOtherBtn = document.getElementById('selectOtherBtn');
    const detectContactsBtn = document.getElementById('detectContactsBtn');
    const drillHolesBtn = document.getElementById('drillHolesBtn');
    const halfSlotBtn = document.getElementById('halfSlotBtn');
    const fullSlotBtn = document.getElementById('fullSlotBtn');
    const restoreBtn = document.getElementById('restoreBtn');

    function send(action) {
      if (window.adsk && window.adsk.fusionSendData) {
        window.adsk.fusionSendData('response', JSON.stringify({ action }));
      } else {
        result.textContent = 'Fusion bridge not available.';
      }
    }

    scanBtn.addEventListener('click', () => send('scan'));
    applyColorBtn.addEventListener('click', () => send('applyColor'));
    select15Btn.addEventListener('click', () => send('select15'));
    select18Btn.addEventListener('click', () => send('select18'));
    selectOtherBtn.addEventListener('click', () => send('selectOther'));
    detectContactsBtn.addEventListener('click', () => send('detectContacts'));
    drillHolesBtn.addEventListener('click', () => send('drillScrewHoles'));
    halfSlotBtn.addEventListener('click', () => send('halfSlot'));
    fullSlotBtn.addEventListener('click', () => send('fullSlot'));
    restoreBtn.addEventListener('click', () => send('restoreGenerated'));

    window.fusionJavaScriptHandler = {
      handle: function(action, data) {
        if (action !== 'scanResult') return;
        if (!data || !String(data).trim()) return;
        try {
          const parsed = JSON.parse(data);
          if (parsed && typeof parsed.text === 'string' && parsed.text.trim()) {
            result.textContent = parsed.text;
          }
        } catch (e) {
          const text = String(data || '');
          if (text.trim()) result.textContent = text;
        }
      }
    };
  </script>
</body>
</html>
